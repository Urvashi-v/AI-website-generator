<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Booking App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Book Your Table</h1>

        <div class="booking-section">
            <h2>Make a Reservation</h2>
            <form id="booking-form" class="booking-form">
                <div class="form-group">
                    <label for="name">Your Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone (Optional):</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                <div class="form-group">
                    <label for="booking-date">Date:</label>
                    <input type="date" id="booking-date" name="date" required>
                </div>
                <div class="form-group">
                    <label for="booking-time">Time:</label>
                    <input type="time" id="booking-time" name="time" required>
                </div>
                <div class="form-group">
                    <label for="guests">Number of Guests:</label>
                    <input type="number" id="guests" name="guests" min="1" max="20" value="1" required>
                </div>
                <div id="discount-message" class="message discount-info"></div>
                <button type="submit">Confirm Booking</button>
            </form>
            <p id="form-message" class="message"></p>
        </div>

        <div class="history-section">
            <h2>Upcoming & Past Bookings</h2>
            <div id="bookings-history">
                <p>No bookings yet.</p>
            </div>
            <p id="history-message" class="message"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
