<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Corner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Coffee Corner</h1>
        <p>Your daily dose of happiness</p>
    </header>

    <main class="container">
        <section class="customer-info-section card">
            <h2>Customer Information</h2>
            <div class="input-group">
                <label for="customer-name">Your Name:</label>
                <input type="text" id="customer-name" placeholder="Enter your name" required>
            </div>
        </section>

        <section class="menu-section card">
            <h2>Our Menu</h2>
            <div id="menu-items-container" class="menu-grid">
                <!-- Menu items will be loaded here by script.js -->
            </div>
        </section>

        <section class="order-builder-section card">
            <h2>Your Current Order</h2>
            <ul id="current-order-list" class="order-list">
                <!-- Current order items will be loaded here by script.js -->
                <li class="empty-order-message">No items in your order yet.</li>
            </ul>
            <div class="order-summary">
                <p>Total: $<span id="total-amount">0.00</span></p>
                <button id="place-order-btn" class="btn primary-btn">Place Order</button>
            </div>
        </section>

        <section class="order-history-section card">
            <h2>Order History</h2>
            <ul id="order-history-list" class="history-list">
                <!-- Order history will be loaded here by script.js -->
                <li class="empty-history-message">No past orders found.</li>
            </ul>
        </section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
